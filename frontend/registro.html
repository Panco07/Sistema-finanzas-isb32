<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Gestión de Finanzas</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="contenedor-principal">
        
        <div class="encabezado">
            <h1> Crear Cuenta</h1>
            <p>Únete y comienza a controlar tus finanzas</p>
        </div>

        <div class="tarjeta">
            <h2>Registro de Usuario</h2>
            
            <form id="formularioRegistro">
                <!-- Campo: Nombre Completo -->
                <div class="campo-formulario">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Oscar Isaac Hurtado Aguilar" required>
                </div>

                <!-- Campo: Cédula -->
                <div class="campo-formulario">
                    <label for="cedula">Cédula:</label>
                    <input type="text" id="cedula" name="cedula" placeholder="123456789" required>
                </div>

                <!-- Campo: Apodo Digital -->
                <div class="campo-formulario">
                    <label for="apodo">Apodo Digital:</label>
                    <input type="text" id="apodo" name="apodo" placeholder="Panco07" required>
                </div>

                <!-- Campo: Teléfono -->
                <div class="campo-formulario">
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="8888-8888">
                </div>

                <!-- Campo: Contraseña -->
                <div class="campo-formulario">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <!-- Botón de Registro -->
                <button type="submit" class="btn-primary">Registrarse</button>
            </form>

            <!-- Enlace a Login -->
            <div class="enlace-registro">
                <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
            </div>
        </div>

    </div>

    <script src="js/registro.js"></script>
</body>
</html>
